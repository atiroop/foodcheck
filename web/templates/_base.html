<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — FoodCheck</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    /* PD highlight colors */
    .pd-warn { background: #FEF9C3; border-left: 4px solid #EAB308; }
    /* Scrollbar thin */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    /* Search dropdown */
    .search-dropdown { max-height: 340px; overflow-y: auto; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0891B2',
            'primary-dark': '#0E7490',
            accent: '#059669',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-primary text-lg leading-tight">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        <span>FoodCheck</span>
      </a>
      <a href="/compare" class="flex items-center gap-1 text-sm text-gray-600 hover:text-primary transition-colors min-h-[44px] px-2 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H2v13h6"/><path d="M22 8H8v13h14z"/>
        </svg>
        <span class="hidden sm:inline">เปรียบเทียบ</span>
      </a>
    </div>
  </nav>

  <!-- Page Content -->
  {{CONTENT}}

  <!-- Footer -->
  <footer class="mt-12 bg-white border-t border-gray-200 py-6 px-4">
    <div class="max-w-4xl mx-auto text-center text-sm text-gray-500 space-y-1">
      <p>ข้อมูลโภชนาการจาก <strong class="text-gray-700">Thai Food Composition Database (Thai FCD)</strong></p>
      <p>สถาบันโภชนาการ มหาวิทยาลัยมหิดล (INMU) — เพื่อการศึกษาและไม่ใช่เชิงพาณิชย์</p>
      <p class="text-xs text-gray-400 pt-1">ค่าโภชนาการเป็นค่าเฉลี่ยต่อ 100 กรัม • ควรปรึกษานักโภชนาการประจำตัวก่อนปรับอาหาร</p>
    </div>
  </footer>

</body>
</html>
